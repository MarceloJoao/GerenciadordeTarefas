<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<f:metadata>
    <f:viewParam name="idEdicao" value="#{tarefaController.idEdicao}" />
</f:metadata>

<h:head>
    <title>Gerenciador de Tarefas</title>
    <meta charset="UTF-8"/>
</h:head>

<h:body>

    <f:event type="preRenderView"
             listener="#{tarefaController.carregarTarefaParaEdicao}" />
    <h1>Gerenciador de Tarefas</h1>
    <h:link outcome="/CadastroResponsavel.xhtml" value="Responsáveis" />
    <h:outputText value=" | " />
    <h:link outcome="/FiltroTarefas.xhtml" value="Listar Tarefas" />

    <h:form id="cadastroForm">
        <h2>Cadastrar Tarefa</h2>

        <h:panelGrid columns="2" cellpadding="5">

            <h:outputLabel for="titulo" value="Título:" />
            <h:inputText id="titulo"
                         value="#{tarefaController.tarefa.titulo}"
                         required="true" />

            <h:outputLabel for="descricao" value="Descrição:" />
            <h:inputTextarea id="descricao"
                             value="#{tarefaController.tarefa.descricao}"
                             rows="5" cols="40"
                             required="true" />

            <h:outputLabel for="responsavel" value="Responsável:" />
            <h:selectOneMenu id="responsavel"
                             value="#{tarefaController.responsavelId}"
                             required="true">
                <f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
                <f:selectItems value="#{tarefaController.responsaveis}"
                               var="r"
                               itemValue="#{r.id}"
                               itemLabel="#{r.nome}" />
            </h:selectOneMenu>

            <h:outputLabel for="prioridade" value="Prioridade:" />
            <h:selectOneMenu id="prioridade"
                             value="#{tarefaController.tarefa.prioridade}"
                             required="true">
                <f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
                <f:selectItems value="#{tarefaController.prioridades}"
                               var="p"
                               itemValue="#{p}"
                               itemLabel="#{p}" />
            </h:selectOneMenu>

            <h:outputLabel for="deadline" value="Deadline (dd/MM/yyyy):" />
            <h:inputText id="deadline"
                         value="#{tarefaController.tarefa.deadline}"
                         required="true">
                <f:convertDateTime pattern="dd/MM/yyyy" />
            </h:inputText>

        </h:panelGrid>

        <br/>

        <h:commandButton value="Cadastrar" action="#{tarefaController.salvar}" />

        <br/><br/>
        <h:messages style="color:red;" />
    </h:form>

    <hr/>
</h:body>
</html>
